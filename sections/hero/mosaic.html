<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hero — Mosaic</title>
<link rel="stylesheet" href="../../base/base.css">
<link rel="stylesheet" href="../../personalities/warm-residential.css">
<link rel="stylesheet" href="mosaic.css">
</head>
<body>
<section class="section hero hero--mosaic">
  <div class="container hero--mosaic__inner">

    <div class="hero--mosaic__body">
      <span class="eyebrow">Licensed &amp; Insured</span>
      <h1 class="display">We get it done right.</h1>
      <p class="lead">Fast, reliable service across the area. No surprises — just honest work and clean results.</p>
      <div class="hero__actions">
        <a href="#" class="btn btn--brand btn--lg">Get a Free Estimate</a>
        <a href="#" class="btn btn--outline btn--lg">See Our Work</a>
      </div>
      <ul class="hero--mosaic__badges">
        <li>⭐ 4.9 Rating</li>
        <li>✓ Background Checked</li>
        <li>✓ Same-Day Available</li>
      </ul>
    </div>

    <div class="hero--mosaic__frame" aria-hidden="true">
      <div class="hero--mosaic__col">
        <div class="hero--mosaic__tile">
          <img src="https://picsum.photos/seed/mosaic1/480/380" alt="">
        </div>
        <div class="hero--mosaic__tile">
          <img src="https://picsum.photos/seed/mosaic2/480/260" alt="">
        </div>
      </div>
      <div class="hero--mosaic__col">
        <div class="hero--mosaic__tile">
          <img src="https://picsum.photos/seed/mosaic3/480/260" alt="">
        </div>
        <div class="hero--mosaic__tile">
          <img src="https://picsum.photos/seed/mosaic4/480/380" alt="">
        </div>
      </div>
    </div>

  </div>
</section>
</body>
</html>
